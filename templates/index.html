        async function importParsedData() {
            if (parsedData.length === 0) {
                try {
                    parsedData = JSON.parse(document.getElementById('parseResult').value);
                } catch (e) {
                    alert('请先识别图片或输入有效的JSON数据');
                    return;
                }
            }
            
            const userSpecNumber = document.getElementById('importSpecNumber').value.trim();
            const userAlloyGrade = document.getElementById('importAlloyGrade').value.trim();
            
            const processedSpecs = [];
            for (const spec of parsedData) {
                let alloyGrades = [];
                if (userAlloyGrade) {
                    alloyGrades = [userAlloyGrade];
                } else if (spec.alloy_grade) {
                    alloyGrades = spec.alloy_grade.split(/[,，]/).map(g => g.trim()).filter(g => g);
                }
                
                if (alloyGrades.length > 0) {
                    for (const grade of alloyGrades) {
                        const newSpec = { ...spec };
                        newSpec.alloy_grade = grade;
                        if (userSpecNumber) {
                            newSpec.material_spec_number = userSpecNumber;
                        }
                        if (!newSpec.material_spec_number) {
                            newSpec.material_spec_number = '-';
                        }
                        if (!newSpec.status) {
                            newSpec.status = '-';
                        }
                        if (!newSpec.specification) {
                            newSpec.specification = '-';
                        }
                        if (!newSpec.sampling_direction) {
                            newSpec.sampling_direction = '-';
                        }
                        processedSpecs.push(newSpec);
                    }
                } else {
                    if (userSpecNumber) {
                        spec.material_spec_number = userSpecNumber;
                    }
                    if (!spec.material_spec_number) {
                        spec.material_spec_number = '-';
                    }
                    if (!spec.status) {
                        spec.status = '-';
                    }
                    if (!spec.specification) {
                        spec.specification = '-';
                    }
                    if (!spec.sampling_direction) {
                        spec.sampling_direction = '-';
                    }
                    processedSpecs.push(spec);
                }
            }
            
            try {
                const res = await fetch('/api/batch-import', {

        async function saveCategory() {
            const categoryId = document.getElementById('categoryId').value;
            const name = document.getElementById('categoryName').value;
            const code = document.getElementById('categoryCode').value;
            const description = document.getElementById('categoryDescription').value;
            
            if (!name || !code) {
                alert('请填写类别名称和代码');
                return;
            }
            
            const fieldItems = document.querySelectorAll('.field-item');
            const fields = [];
            
            fieldItems.forEach((item, index) => {
                const fieldName = item.querySelector('.field-name').value;
                const fieldCode = item.querySelector('.field-code').value;
                const fieldType = item.querySelector('.field-type').value;
                const fieldUnit = item.querySelector('.field-unit').value;
                const fieldSort = parseInt(item.querySelector('.field-sort').value) || index;
                const fieldDescription = item.querySelector('.field-description').value;
                const fieldRequired = item.querySelector('.field-required').checked;
                
                if (!fieldName || !fieldCode) {
                    alert('请填写所有字段的名称和代码');
                    throw new Error('字段信息不完整');
                }
                
                fields.push({
                    field_name: fieldName,
                    field_code: fieldCode,
                    field_type: fieldType,
                    unit: fieldUnit,
                    description: fieldDescription,
                    is_required: fieldRequired,
                    sort_order: fieldSort
                });
            });
            
            try {
                let url = '/api/admin/categories';
                let method = 'POST';
                
                if (categoryId) {
                    url = `/api/admin/categories/${categoryId}`;
                    method = 'PUT';
                }
                
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        code: code,
                        description: description,
                        fields: fields
                    })
                });
                
                const data = await res.json();
                if (data.success) {
                    alert('保存成功');
                    categoryModal.hide();
                    loadCategoriesForAdmin();
                } else {
                    alert('保存失败: ' + data.error);
                }
            } catch (e) {
                alert('保存失败: ' + e.message);
            }
        }

        async function saveFieldMapping() {
            const mappingId = document.getElementById('fieldMappingId').value;
            const target_field_code = document.getElementById('fieldMappingTargetField').value;
            const category_code = document.getElementById('fieldMappingCategoryCode').value;
            const is_active = document.getElementById('fieldMappingIsActive').checked;
            
            const sourceFieldInputs = document.querySelectorAll('.source-field-input');
            const source_fields = Array.from(sourceFieldInputs)
                .map(input => input.value.trim())
                .filter(value => value);

            if (source_fields.length === 0 || !target_field_code) {
                alert('请填写源字段和目标字段代码');
                return;
            }

            try {
                let url = '/api/admin/field-mappings';
                let method = 'POST';

                if (mappingId) {
                    url = `/api/admin/field-mappings/${mappingId}`;
                    method = 'PUT';
                }

                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        source_fields: source_fields,
                        target_field_code: target_field_code,
                        category_code: category_code || null,
                        is_active: is_active
                    })
                });

                const data = await res.json();
                if (data.success) {
                    alert('保存成功');
                    fieldMappingModal.hide();
                    loadFieldMappings();
                } else {

        function removeSourceField(button) {
            const container = document.getElementById('sourceFieldsContainer');
            const inputs = container.querySelectorAll('.source-field-input');
            
            if (inputs.length <= 1) {
                button.parentElement.remove();
                
                const newInputs = container.querySelectorAll('.source-field-input');
                if (newInputs.length === 1) {
                    newInputs[0].nextElementSibling.style.display = 'none';
                }
            } else {
                button.parentElement.remove();
            }
        }

        async function deleteFieldMapping(mappingId) {
            if (!confirm('确定要删除这个字段映射吗？')) return;

            try {
                const res = await fetch(`/api/admin/field-mappings/${mappingId}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    alert('删除成功');
                    loadFieldMappings();
                } else {
                    alert('删除失败：' + data.error);
                }
            } catch (e) {
                alert('删除失败');
            }
        }
    </script>
</body>
</html>
